services:
  opencode:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OPENCODE_SERVER_HOSTNAME: 0.0.0.0
      OPENCODE_SERVER_PORT: 4096
      OPENCODE_WORKSPACE_ROOT: /workspace
    working_dir: /workspace
    volumes:
      - opencode-home:/home/opencode
      - ${WORKSPACE_DIR:-./workspace}:/workspace
    command: ["/usr/local/bin/opencode-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4096/global/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  telegram-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OPENCODE_API_URL: http://opencode:4096
    depends_on:
      opencode:
        condition: service_healthy
    volumes:
      - bot-home:/home/opencode
    command: ["/usr/local/bin/telegram-bot-entrypoint.sh"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  opencode-home:
  bot-home:
